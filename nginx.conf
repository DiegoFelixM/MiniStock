server {
  listen 80;

  location / {
    proxy_pass http://frontend:5173;
    proxy_set_header Host $host;
  }

  location /api/ {
    proxy_pass http://backend:3000/api/;
    proxy_set_header Host $host;
  }

  location /health {
    proxy_pass http://backend:3000/health;
    proxy_set_header Host $host;
  }
}