services:
  db:
    image: mysql:8
    container_name: contenedor_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mini_stock
      MYSQL_ROOT_HOST: "%"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: contenedor_backend
    ports:
      - "3000:3000"
    depends_on:
      - db
    restart: always

  frontend:
    build: ./frontend
    container_name: contenedor_frontend
    ports:
      - "8080:5173"
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    container_name: contenedor_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
  db_data: